<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeX Network - AI Assistant</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0f0f17;
      --bg-secondary: #1a1a2e;
      --bg-chat: #12121c;
      --accent: #6c63ff;
      --accent-hover: #5a52e0;
      --text-primary: #e8e8f0;
      --text-secondary: #8888a8;
      --msg-user-bg: #6c63ff;
      --msg-bot-bg: #1e1e32;
      --border-color: #2a2a44;
      --input-bg: #1a1a2e;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-text p {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat-container::-webkit-scrollbar { width: 6px; }
    #chat-container::-webkit-scrollbar-track { background: transparent; }
    #chat-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

    .message {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot { align-self: flex-start; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.user .avatar { background: var(--accent); }
    .message.bot .avatar { background: var(--msg-bot-bg); border: 1px solid var(--border-color); }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 14px;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .message.user .bubble {
      background: var(--msg-user-bg);
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: var(--msg-bot-bg);
      border: 1px solid var(--border-color);
      border-bottom-left-radius: 4px;
    }

    .bubble code {
      background: rgba(108, 99, 255, 0.15);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 13px;
    }

    .bubble pre {
      background: #0d0d14;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      margin: 8px 0;
      overflow-x: auto;
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.5;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: var(--text-secondary);
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
      align-self: center;
      max-width: 500px;
    }

    .welcome h2 {
      font-size: 24px;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .welcome p {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .suggestion-chip {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion-chip:hover {
      background: var(--accent);
      border-color: var(--accent);
    }

    .input-area {
      padding: 16px 24px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 800px;
      margin: 0 auto;
    }

    #user-input {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 46px;
      max-height: 150px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }

    #user-input:focus { border-color: var(--accent); }

    #user-input::placeholder { color: var(--text-secondary); }

    #send-btn {
      width: 46px;
      height: 46px;
      background: var(--accent);
      border: none;
      border-radius: 14px;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    #send-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    #send-btn svg {
      width: 20px;
      height: 20px;
    }

    .error-msg {
      color: #f87171;
      font-size: 13px;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.2);
      padding: 8px 12px;
      border-radius: 8px;
      margin-top: 4px;
    }

    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      #chat-container { padding: 16px; }
      .input-area { padding: 12px 16px; }
      .message { max-width: 92%; }
      .welcome h2 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">CX</div>
    <div class="header-text">
      <h1>CodeX Network AI</h1>
      <p><span class="status-dot"></span>Online &mdash; Ready to assist</p>
    </div>
  </header>

  <div id="chat-container">
    <div class="welcome" id="welcome">
      <h2>Welcome to CodeX Network AI</h2>
      <p>Your intelligent assistant powered by advanced AI. Ask me anything &mdash; coding questions, explanations, debugging help, and more.</p>
      <div class="suggestions">
        <button class="suggestion-chip" onclick="useSuggestion(this)">Explain async/await in JavaScript</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">Write a Python sorting algorithm</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">How does HTTP work?</button>
        <button class="suggestion-chip" onclick="useSuggestion(this)">Help me debug my code</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea
        id="user-input"
        placeholder="Type your message..."
        rows="1"
        autofocus
      ></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const welcome = document.getElementById('welcome');
    let isWaiting = false;

    userInput.addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 150) + 'px';
    });

    userInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function useSuggestion(chip) {
      userInput.value = chip.textContent;
      sendMessage();
    }

    function addMessage(text, sender) {
      if (welcome) welcome.style.display = 'none';

      const msgDiv = document.createElement('div');
      msgDiv.className = 'message ' + sender;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = sender === 'user' ? '👤' : '🤖';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = formatMessage(text);

      msgDiv.appendChild(avatar);
      msgDiv.appendChild(bubble);
      chatContainer.appendChild(msgDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return msgDiv;
    }

    function formatMessage(text) {
      let formatted = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      formatted = formatted.replace(/```(\w*)\n?([\s\S]*?)```/g, function (match, lang, code) {
        return '<pre><code>' + code.trim() + '</code></pre>';
      });

      formatted = formatted.replace(/`([^`]+)`/g, '<code>$1</code>');

      formatted = formatted.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      formatted = formatted.replace(/\*(.+?)\*/g, '<em>$1</em>');

      return formatted;
    }

    function showTyping() {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message bot';
      msgDiv.id = 'typing-msg';

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = '🤖';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

      msgDiv.appendChild(avatar);
      msgDiv.appendChild(bubble);
      chatContainer.appendChild(msgDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeTyping() {
      const typing = document.getElementById('typing-msg');
      if (typing) typing.remove();
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text || isWaiting) return;

      isWaiting = true;
      sendBtn.disabled = true;
      addMessage(text, 'user');
      userInput.value = '';
      userInput.style.height = 'auto';

      showTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: text })
        });

        const data = await res.json();
        removeTyping();

        if (data.success) {
          addMessage(data.response, 'bot');
        } else {
          addMessage('Sorry, something went wrong. ' + (data.error || 'Please try again.'), 'bot');
        }
      } catch (err) {
        removeTyping();
        addMessage('Connection error. Please check your network and try again.', 'bot');
      }

      isWaiting = false;
      sendBtn.disabled = false;
      userInput.focus();
    }
  </script>
</body>
</html>
